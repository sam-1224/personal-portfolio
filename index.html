      rel="stylesheet"
    />

    <!-- Apply saved daisyUI theme before paint to avoid flash; 'dark' is default -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        var themes = ['dark','night','synthwave','dracula','sunset','dim','light','corporate','retro','nord'];
        if (themes.indexOf(t) !== -1) {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    </script>
